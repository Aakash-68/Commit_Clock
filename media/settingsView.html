<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      body {
        font-family: sans-serif;
        padding: 10px;
      }
      h1 {
        margin-bottom: 0;
      }
      p {
        color: #666;
      }
      label {
        font-weight: bold;
        display: block;
        margin-top: 15px;
      }
      select,
      input[type="text"] {
        width: 100%;
        padding: 4px;
        margin-top: 5px;
        margin-bottom: 10px;
      }
    </style>
  </head>
  <body>
    <h1>My Cool Settings</h1>
    <p>Lorem lorem ipsum dolor sit amet.</p>

    <label for="frequency">How often do you want to auto-commit?</label>
    <select id="frequency">
      <option value="1">Every 1 min</option>
      <option value="5">Every 5 min</option>
      <option value="15">Every 15 min</option>
      <option value="30">Every 30 min</option>
    </select>

    <label for="username">Enter your nickname for commits:</label>
    <input type="text" id="username" placeholder="type something..." />
  </body>
</html>
